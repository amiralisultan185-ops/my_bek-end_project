  /inquiries/{inquiry_id}/assign:
    post:
      tags: [Заявки]
      summary: Назначить юриста на заявку (только директор)
      description: |
        Атомарная транзакция (SERIALIZABLE + SELECT FOR UPDATE):
        1. Проверяет что заявка в статусе `new`.
        2. Создаёт Case со статусом `active`.
        3. Меняет статус заявки на `assigned`.
        4. Отправляет email юристу и клиенту.
      parameters:
        - name: inquiry_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignRequest'
      responses:
        "201":
          description: Юрист назначен, дело создано.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Юрист назначен. Дело создано."
                  case_id:
                    type: string
                    format: uuid
                    example: "9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d"
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          description: Заявка уже назначена или не в статусе new.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
