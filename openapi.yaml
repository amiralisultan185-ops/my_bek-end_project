          $ref: '#/components/responses/ValidationError'

  /groups/{group_id}/members:
    post:
      tags: [Groups]
      summary: Add a user to a group
      parameters:
        - name: group_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupMemberAdd'
      responses:
        "201":
          description: User added to group.
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "422":
          $ref: '#/components/responses/ValidationError'

  /groups/{group_id}/cases:
    post:
      tags: [Groups]
      summary: Attach a case to a group
      parameters:
        - name: group_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupCaseAdd'
      responses:
        "201":
          description: Case attached to group.
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "422":
          $ref: '#/components/responses/ValidationError'

  /jobs/email:
    get:
      tags: [Background Jobs]
      summary: Список email jobs
      description: Redis-backed visibility endpoint для email queue: queued, processing, completed, failed.
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [queued, processing, completed, failed]
        - name: limit
          in: query
          schema:
            type: integer
            default: 25
      responses:
        "200":
          description: Email jobs.
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'

  /jobs/email/{job_id}:
    get:
      tags: [Background Jobs]
      summary: Детали email job
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Job detail.
        "404":
          $ref: '#/components/responses/NotFound'

  /users:
    get:
      tags: [Пользователи]
      summary: Список юристов с нагрузкой (только директор)
      parameters:
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: is_active
          in: query
          schema:
            type: boolean
          example: true
      responses:
        "200":
          description: Список юристов.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/LawyerWorkload'
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [Пользователи]
      summary: Создать аккаунт юриста (только директор)
      description: |
        Генерирует временный пароль и отправляет его на email юриста.
        Юрист должен сменить пароль при первом входе (must_change_password=true).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        "201":
          description: Аккаунт создан, письмо отправлено.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCreateResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "409":
          description: Email уже используется.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/all:
    get:
      tags: [Пользователи]
      summary: Список всех пользователей
      parameters:
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: role
          in: query
          schema:
            $ref: '#/components/schemas/UserRole'
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Пользователи с группами.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserSummary'
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'

  /users/{user_id}/reset-password:
    patch:
      tags: [Пользователи]
      summary: Сбросить пароль пользователя
      description: Генерирует новый временный пароль и выставляет must_change_password=true.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Новый временный пароль создан.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/UserSummary'
                  temp_password:
                    type: string
                    example: "TempPass123!"
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

  /users/{user_id}/make-director:
    patch:
      tags: [Пользователи]
      summary: Назначить нового директора
      description: Новый директор должен быть активным lawyer или senior_lawyer без активных дел. Все текущие active directors переводятся в senior_lawyer.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Пользователь назначен директором.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "409":
          description: У пользователя есть активные дела или он уже директор.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          $ref: '#/components/responses/ValidationError'

  /users/{user_id}/deactivate:
    patch:
      tags: [Пользователи]
      summary: Деактивировать юриста (только директор)
      description: |
        Устанавливает is_active=false. Юрист теряет доступ к системе.
        Запрещено если есть активные дела (переназначьте сначала).
        Исторические данные сохраняются.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Аккаунт деактивирован.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          description: У юриста есть активные дела.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: conflict
                message: "У юриста 2 активных дела. Переназначьте их перед деактивацией."

  /users/me:
    get:
      tags: [Пользователи]
      summary: Профиль текущего пользователя
      responses:
        "200":
          description: Профиль.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
        "401":
          $ref: '#/components/responses/Unauthorized'

    patch:
      tags: [Пользователи]
      summary: Обновить профиль / сменить пароль
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name:
                  type: string
                  maxLength: 200
                phone:
                  type: string
                  maxLength: 30
                current_password:
                  type: string
                  description: Обязателен при смене пароля.
                new_password:
                  type: string
                  minLength: 8
                  description: Минимум 8 символов, 1 заглавная, 1 цифра, 1 спецсимвол.
      responses:
        "200":
          description: Профиль обновлён.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "422":
          $ref: '#/components/responses/ValidationError'
