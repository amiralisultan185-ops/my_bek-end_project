services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lexlink-app
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      NODE_ENV: ${NODE_ENV:-development}
      BACKEND_PORT: 3001
      PORT: 3001
      FRONTEND_PORT: ${FRONTEND_PORT:-5173}
      APP_NAME: ${APP_NAME:-POWER LAW Digital API}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:3001}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3001}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3001}

      DATABASE_URL: postgresql://lexlink:lexlink@postgres:5432/lexlink?schema=public
      REDIS_URL: redis://redis:6379/0
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-power-law-digital}

      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-jwt-secret-key-min-32-chars}
      JWT_REFRESH_SECRET_KEY: ${JWT_REFRESH_SECRET_KEY:-change-me-refresh-secret-key-min-32-chars}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-change-me-app-secret-key-min-32-chars}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-30}

      OWNER_EMAIL: ${OWNER_EMAIL:-owner@example.invalid}
      OWNER_PASSWORD: ${OWNER_PASSWORD:-OwnerPass123!}
      OWNER_NAME: ${OWNER_NAME:-POWER LAW Digital Owner}

      OTP_LENGTH: ${OTP_LENGTH:-6}
      OTP_TTL_MINUTES: ${OTP_TTL_MINUTES:-15}
      OTP_MAX_ATTEMPTS: ${OTP_MAX_ATTEMPTS:-3}
      OTP_RESEND_COOLDOWN_SECONDS: ${OTP_RESEND_COOLDOWN_SECONDS:-60}
      EMAIL_VERIFICATION_TTL_MINUTES: ${EMAIL_VERIFICATION_TTL_MINUTES:-30}
      PASSWORD_RESET_TTL_MINUTES: ${PASSWORD_RESET_TTL_MINUTES:-30}

      RATE_LIMIT_SUBMIT_PER_HOUR: ${RATE_LIMIT_SUBMIT_PER_HOUR:-5}
      RATE_LIMIT_LOGIN_PER_MINUTE: ${RATE_LIMIT_LOGIN_PER_MINUTE:-10}
      RATE_LIMIT_API_PER_MINUTE: ${RATE_LIMIT_API_PER_MINUTE:-100}

      SMTP_HOST: ${SMTP_HOST:-smtp.example.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_API_KEY: ${EMAIL_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-POWER LAW Digital <noreply@example.invalid>}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-POWER LAW Digital <noreply@example.invalid>}
      EMAIL_QUEUE_ENABLED: ${EMAIL_QUEUE_ENABLED:-true}
      EMAIL_WORKER_ENABLED: ${EMAIL_WORKER_ENABLED:-true}
      EMAIL_JOB_MAX_ATTEMPTS: ${EMAIL_JOB_MAX_ATTEMPTS:-3}

      DOCUMENT_ENCRYPTION_KEY: ${DOCUMENT_ENCRYPTION_KEY:-change-me-document-encryption-key-min-32-chars}
      DOCUMENT_MAX_UPLOAD_BYTES: ${DOCUMENT_MAX_UPLOAD_BYTES:-20971520}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lexlink-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: lexlink-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    environment:
      API_PROXY_PASS: ${API_PROXY_PASS:-http://app:3001/}
      API_PROXY_HOST: ${API_PROXY_HOST:-app}
      API_BASE_URL: ${API_BASE_URL:-}
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lexlink-network

  postgres:
    image: postgres:15-alpine
    container_name: lexlink-postgres
    environment:
      POSTGRES_USER: lexlink
      POSTGRES_PASSWORD: lexlink
      POSTGRES_DB: lexlink
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lexlink -d lexlink"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lexlink-network

  redis:
    image: redis:7-alpine
    container_name: lexlink-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lexlink-network

volumes:
  postgres_data:
  redis_data:

networks:
  lexlink-network:
    driver: bridge
